<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GK Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA META -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="GK Store">

<style>
/* ================= GENERAL ================= */
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:Arial;background:#000;color:#fff;overflow:hidden;}

/* ================= WELCOME SCREEN ================= */
#welcome {
  position:fixed;top:0;left:0;width:100%;height:100%;background:#111;
  display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:20;transition:0.3s;
}
#welcome.hide {top:-100%;opacity:0;}
#welcome h1 {color:gold;margin-bottom:20px;}
#welcome form {background:#1a1a1a;padding:20px;border-radius:16px;width:300px;display:flex;flex-direction:column;gap:12px;}
#welcome input {padding:10px;border-radius:10px;border:none;}
#welcome button {padding:10px;border-radius:20px;border:none;background:gold;color:#000;font-weight:bold;cursor:pointer;}
#welcome p {font-size:14px;color:#aaa;text-align:center;cursor:pointer;}
#welcome p:hover {color:gold;}

/* ================= APP SCREEN ================= */
#app {display:none;height:100vh;width:100vw;overflow:hidden;}

/* ================= HEADER ================= */
header {position:fixed;top:0;width:100%;height:60px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:10;}
.logo {display:flex;align-items:center;gap:8px;}
.logo svg {width:36px;height:36px;}
header select {background:#111;color:#fff;border:none;padding:6px 8px;border-radius:8px;}

/* ================= NAVIGATION ================= */
nav {position:fixed;bottom:0;width:100%;height:60px;background:#111;display:flex;justify-content:space-around;align-items:center;z-index:10;}
nav button {background:none;border:none;color:#aaa;font-size:14px;}
nav button:hover {color:gold;}

/* ================= SECTIONS ================= */
section {display:none;height:100vh;padding:70px 10px 70px 10px;overflow-y:auto;}
section.active {display:block;}

/* ================= HOME FEED ================= */
.feed {height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;}
.video-card {height:100%;scroll-snap-align:start;position:relative;}
video {width:100%;height:100%;object-fit:cover;}

/* ================= OVERLAY ================= */
.overlay {position:absolute;bottom:90px;left:12px;background:rgba(0,0,0,0.5);padding:10px;border-radius:12px;}
.overlay button {display:block;margin-top:6px;padding:8px 14px;border:none;border-radius:20px;font-weight:bold;}
.hold-btn {background:gold;}
.buy-btn {background:#25D366;}

/* ================= CARDS ================= */
.card {background:#111;border-radius:14px;padding:12px;margin-bottom:12px;}

/* ================= ACCOUNT LIST ================= */
.list-item {display:flex;align-items:center;background:#1a1a1a;padding:10px;border-radius:12px;margin-bottom:8px;}
.list-item img {width:80px;height:50px;object-fit:cover;border-radius:8px;margin-right:10px;}
.list-item button {margin-left:auto;background:gold;border:none;padding:6px 12px;border-radius:14px;font-weight:bold;}

/* ================= CONTACT ================= */
.contact-btn {display:block;text-align:center;margin-top:10px;padding:10px;border-radius:20px;font-weight:bold;text-decoration:none;}
.whatsapp {background:#25D366;color:#000;}
.email {background:#4285f4;color:#fff;}
.copy {background:gold;color:#000;}

/* ================= ADMIN ================= */
input, select {width:100%;padding:8px;margin-bottom:8px;border-radius:8px;border:none;}
.admin-btn {width:100%;padding:10px;background:gold;border:none;border-radius:20px;font-weight:bold;}
.hold-item {background:#1a1a1a;padding:10px;border-radius:10px;margin-bottom:8px;}
</style>
</head>
<body>

<!-- ================= WELCOME SCREEN ================= -->
<div id="welcome">
  <h1>GK Store</h1>
  <!-- LOGIN FORM -->
  <form id="login-form">
    <input type="text" id="login-email" placeholder="Email or Phone" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="submit">Login</button>
    <p id="show-signup">Don't have an account? Sign Up</p>
  </form>
  <!-- SIGNUP FORM -->
  <form id="signup-form" style="display:none;">
    <input type="text" id="signup-name" placeholder="Full Name" required>
    <input type="text" id="signup-email" placeholder="Email or Phone" required>
    <input type="password" id="signup-password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
    <p id="show-login">Already have an account? Login</p>
  </form>
</div>

<!-- ================= APP SCREEN ================= -->
<div id="app">

<header>
  <div class="logo">
    <svg viewBox="0 0 64 64">
      <path fill="gold" d="M4 44h56l-4 12H8z"/>
      <path fill="gold" d="M4 44L16 20l16 16 16-16 12 24z"/>
    </svg>
    <b>GK Store</b>
  </div>
  <select id="lang" onchange="setLanguage(this.value)">
    <option value="en">English</option>
    <option value="ps">Pashto</option>
    <option value="fa">Farsi</option>
    <option value="ar">Arabic</option>
    <option value="hi">Hindi</option>
    <option value="ur">Urdu</option>
  </select>
</header>

<nav>
  <button onclick="show('home')" id="nav-home">Home</button>
  <button onclick="show('accounts')" id="nav-accounts">Accounts</button>
  <button onclick="show('admin')" id="nav-admin">Admin</button>
  <button onclick="show('contact')" id="nav-contact">Contact</button>
  <button onclick="show('profile')" id="nav-profile">Profile</button>
</nav>

<section id="home" class="active">
  <div class="feed" id="feed"></div>
</section>

<section id="accounts">
  <div class="card"><h3 id="small-title">Small Accounts</h3><div id="small"></div></div>
  <div class="card"><h3 id="medium-title">Medium Accounts</h3><div id="medium"></div></div>
  <div class="card"><h3 id="big-title">Big Accounts</h3><div id="big"></div></div>
</section>

<section id="admin">
  <div class="card">
    <h3 id="add-video-title">Add Video</h3>
    <input id="title" placeholder="Title">
    <input id="price" placeholder="Price">
    <input id="url" placeholder="Video URL (.mp4)">
    <select id="tier">
      <option value="small">Small</option>
      <option value="medium">Medium</option>
      <option value="big">Big</option>
    </select>
    <button class="admin-btn" onclick="addVideo()" id="upload-btn">Upload</button>
  </div>
  <div class="card">
    <h3 id="hold-title">Hold Requests</h3>
    <div id="holds"></div>
  </div>
</section>

<section id="contact">
  <div class="card">
    <h3 id="contact-title">Contact Admin</h3>
    <a class="contact-btn whatsapp" href="https://wa.me/93700000000" id="whatsapp-btn">WhatsApp</a>
    <a class="contact-btn email" href="mailto:admin@gkstore.com" id="email-btn">Email</a>
    <button class="contact-btn copy" onclick="copyUSDT()" id="copy-btn">Copy USDT TRC20</button>
  </div>
</section>

<section id="profile">
  <div class="card">
    <h3 id="profile-title">User Profile</h3>
    <button class="admin-btn" onclick="logout()">Logout</button>
  </div>
</section>

<script>
/* ================= LOGIN / SIGNUP ================= */
const welcome=document.getElementById("welcome");
const loginForm=document.getElementById("login-form");
const signupForm=document.getElementById("signup-form");
const app=document.getElementById("app");

document.getElementById("show-signup").onclick=()=>{loginForm.style.display="none";signupForm.style.display="flex";};
document.getElementById("show-login").onclick=()=>{signupForm.style.display="none";loginForm.style.display="flex";};

let users=JSON.parse(localStorage.getItem("users")||"[]");

loginForm.onsubmit=e=>{e.preventDefault();
  const email=document.getElementById("login-email").value;
  const password=document.getElementById("login-password").value;
  const user=users.find(u=>u.email===email&&u.password===password);
  if(user){welcome.classList.add("hide");app.style.display="block";}else{alert("Invalid credentials");}
};

signupForm.onsubmit=e=>{e.preventDefault();
  const name=document.getElementById("signup-name").value;
  const email=document.getElementById("signup-email").value;
  const password=document.getElementById("signup-password").value;
  if(users.find(u=>u.email===email)){alert("User already exists");return;}
  users.push({name,email,password});localStorage.setItem("users",JSON.stringify(users));
  alert("Account created! Please login.");signupForm.style.display="none";loginForm.style.display="flex";
};

function logout(){app.style.display="none";welcome.classList.remove("hide");}

/* ================= APP FUNCTIONALITY ================= */
let videos=[{title:"Small Account",price:50,tier:"small",url:"https://www.w3schools.com/html/mov_bbb.mp4"},{title:"Medium Account",price:150,tier:"medium",url:"https://media.w3.org/2010/05/bunny/movie.mp4"},{title:"Big Account",price:400,tier:"big",url:"https://media.w3.org/2010/05/sintel/trailer.mp4"}];
let holds=[];

/* TRANSLATIONS */
const translations={en:{home:"Home",accounts:"Accounts",admin:"Admin",contact:"Contact",profile:"Profile",small_accounts:"Small Accounts",medium_accounts:"Medium Accounts",big_accounts:"Big Accounts",add_video:"Add Video",title:"Title",price:"Price",video_url:"Video URL (.mp4)",hold_requests:"Hold Requests",contact_admin:"Contact Admin",whatsapp:"WhatsApp",email:"Email",copy_usdt:"Copy USDT TRC20",user_profile:"User Profile",logout:"Logout",hold:"Hold",buy:"Buy"},ps:{home:"کورپاڼه",accounts:"حسابونه",admin:"اداره",contact:"اړیکه",profile:"پروفایل",small_accounts:"کوچني حسابونه",medium_accounts:"منځني حسابونه",big_accounts:"لوي حسابونه",add_video:"ویډیو اضافه کړئ",title:"سرلیک",price:"بیه",video_url:"د ویډیو URL (.mp4)",hold_requests:"د هول غوښتنې",contact_admin:"اداره سره اړیکه",whatsapp:"واټس اپ",email:"بریښنالیک",copy_usdt:"USDT TRC20 کاپي کړئ",user_profile:"د کارونکي پروفایل",logout:"وتل",hold:"نیول",buy:"اخیستل"},fa:{home:"خانه",accounts:"حساب‌ها",admin:"مدیریت",contact:"تماس",profile:"پروفایل",small_accounts:"حساب‌های کوچک",medium_accounts:"حساب‌های متوسط",big_accounts:"حساب‌های بزرگ",add_video:"افزودن ویدیو",title:"عنوان",price:"قیمت",video_url:"آدرس ویدیو (.mp4)",hold_requests:"درخواست‌های نگهداری",contact_admin:"تماس با مدیر",whatsapp:"واتساپ",email:"ایمیل",copy_usdt:"کپی USDT TRC20",user_profile:"پروفایل کاربر",logout:"خروج",hold:"نگه داشتن",buy:"خرید"},ar:{home:"الرئيسية",accounts:"الحسابات",admin:"المسؤول",contact:"الاتصال",profile:"الملف الشخصي",small_accounts:"الحسابات الصغيرة",medium_accounts:"الحسابات المتوسطة",big_accounts:"الحسابات الكبيرة",add_video:"أضف فيديو",title:"العنوان",price:"السعر",video_url:"رابط الفيديو (.mp4)",hold_requests:"طلبات الحجز",contact_admin:"اتصل بالمسؤول",whatsapp:"واتساب",email:"البريد الإلكتروني",copy_usdt:"نسخ USDT TRC20",user_profile:"ملف المستخدم",logout:"تسجيل الخروج",hold:"حجز",buy:"شراء"},hi:{home:"होम",accounts:"खाता",admin:"व्यवस्थापक",contact:"संपर्क",profile:"प्रोफ़ाइल",small_accounts:"छोटे खाते",medium_accounts:"मध्यम खाते",big_accounts:"बड़े खाते",add_video:"वीडियो जोड़ें",title:"शीर्षक",price:"मूल्य",video_url:"वीडियो URL (.mp4)",hold_requests:"होल्ड अनुरोध",contact_admin:"एडमिन से संपर्क करें",whatsapp:"व्हाट्सएप",email:"ईमेल",copy_usdt:"USDT TRC20 कॉपी करें",user_profile:"उपयोगकर्ता प्रोफ़ाइल",logout:"लॉग आउट",hold:"होल्ड",buy:"खरीदें"},ur:{home:"ہوم",accounts:"اکاؤنٹس",admin:"ایڈمن",contact:"رابطہ",profile:"پروفائل",small_accounts:"چھوٹے اکاؤنٹس",medium_accounts:"درمیانے اکاؤنٹس",big_accounts:"بڑے اکاؤنٹس",add_video:"ویڈیو شامل کریں",title:"عنوان",price:"قیمت",video_url:"ویڈیو URL (.mp4)",hold_requests:"ہولڈ درخواستیں",contact_admin:"ایڈمن سے رابطہ کریں",whatsapp:"واٹس ایپ",email:"ای میل",copy_usdt:"USDT TRC20 کاپی کریں",user_profile:"صارف پروفائل",logout:"لاگ آؤٹ",hold:"ہولڈ",buy:"خریدیں"}};

function show(id){document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

function setLanguage(lang){localStorage.setItem("lang",lang);applyLanguage();}

function applyLanguage(){const lang=localStorage.getItem("lang")||"en";const t=translations[lang];document.getElementById("nav-home").textContent=t.home;document.getElementById("nav-accounts").textContent=t.accounts;document.getElementById("nav-admin").textContent=t.admin;document.getElementById("nav-contact").textContent=t.contact;document.getElementById("nav-profile").textContent=t.profile;document.getElementById("small-title").textContent=t.small_accounts;document.getElementById("medium-title").textContent=t.medium_accounts;document.getElementById("big-title").textContent=t.big_accounts;document.getElementById("add-video-title").textContent=t.add_video;document.getElementById("upload-btn").textContent=t.add_video;document.getElementById("hold-title").textContent=t.hold_requests;document.getElementById("contact-title").textContent=t.contact_admin;document.getElementById("whatsapp-btn").textContent=t.whatsapp;document.getElementById("email-btn").textContent=t.email;document.getElementById("copy-btn").textContent=t.copy_usdt;document.getElementById("profile-title").textContent=t.user_profile;render();}

function holdVideo(v){let n=prompt("Your Name");let w=prompt("WhatsApp Number");if(n&&w){holds.push({n,w,v:v.title});render();}}
function addVideo(){videos.push({title:title.value,price:price.value,tier:tier.value,url:url.value});render();}
function copyUSDT(){navigator.clipboard.writeText("TXYZ123456789");alert("USDT TRC20 copied!");}

function render(){const lang=localStorage.getItem("lang")||"en";const t=translations[lang];feed.innerHTML="";small.innerHTML=medium.innerHTML=big.innerHTML="";holds.innerHTML="";videos.forEach(v=>{feed.innerHTML+=`<div class="video-card"><video src="${v.url}" autoplay loop muted></video><div class="overlay"><b>${v.title} - $${v.price}</b><button class="hold-btn" onclick='holdVideo(${JSON.stringify(v)})'>${t.hold}</button><button class="buy-btn" onclick="alert('Contact Admin')">${t.buy}</button></div></div>`;document.getElementById(v.tier).innerHTML+=`<div class="list-item"><img src="https://dummyimage.com/160x90/000/fff&text=Video"><div><b>${v.title}</b><br>$${v.price}</div><button onclick="window.open('${v.url}')">View</button></div>`});holds.forEach(h=>{holds.innerHTML+=`<div class="hold-item"><b>${h.n}</b><br><a class="contact-btn whatsapp" href="https://wa.me/${h.w}">Chat User</a></div>`});}
applyLanguage();

/* ================= PWA MANIFEST ================= */
const manifest={name:"GK Store",short_name:"GK Store",start_url:"./",display:"standalone",background_color:"#000000",theme_color:"#000000",icons:[{src:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=",sizes:"192x192",type:"image/png"}]};const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});const manifestURL=URL.createObjectURL(blob);const link=document.createElement("link");link.rel="manifest";link.href=manifestURL;document.head.appendChild(link);

/* ================= SERVICE WORKER (ADVANCED CACHING) ================= */
if("serviceWorker" in navigator){
  const swCode=`
    const CACHE_NAME='gk-store-v1';
    const ASSETS=['./','./favicon.ico'];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(ASSETS)))});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});
  `;
  const swBlob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob));
}
</script>

</body>
</html>
