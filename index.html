<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Video Trading Platform</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GK Trading">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="GK Trading">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --pink-500: #ec4899;
            --pink-600: #db2777;
            --violet-500: #8b5cf6;
            --violet-600: #7c3aed;
            --amber-500: #f59e0b;
            --amber-600: #d97706;
            --emerald-500: #10b981;
            --emerald-600: #059669;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --red-500: #ef4444;
            --red-600: #dc2626;
            --zinc-900: #18181b;
            --zinc-800: #27272a;
            --zinc-700: #3f3f46;
            --zinc-600: #52525b;
            --zinc-500: #71717a;
            --zinc-400: #a1a1aa;
            --zinc-300: #d4d4d8;
            --zinc-200: #e4e4e7;
            --zinc-100: #f4f4f5;
            --zinc-50: #fafafa;
            --white: #ffffff;
            --black: #000000;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: var(--black);
            color: var(--white);
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #app {
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* PWA Install Button */
        .pwa-install-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-500), var(--violet-500));
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            animation: slideUp 0.5s ease-out;
        }

        .pwa-install-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        .pwa-install-btn.hidden {
            display: none;
        }

        /* PWA Install Prompt */
        .pwa-prompt {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--zinc-700);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1001;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
            max-width: 90%;
        }

        .pwa-prompt.hidden {
            display: none;
        }

        .pwa-prompt-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pwa-prompt-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--pink-500), var(--violet-500));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 18px;
        }

        .pwa-prompt-text {
            flex: 1;
        }

        .pwa-prompt-text h4 {
            margin: 0;
            font-size: 14px;
            color: white;
        }

        .pwa-prompt-text p {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--zinc-400);
        }

        .pwa-prompt-buttons {
            display: flex;
            gap: 8px;
        }

        .pwa-prompt-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pwa-prompt-btn.install {
            background: linear-gradient(135deg, var(--pink-500), var(--violet-500));
            color: white;
        }

        .pwa-prompt-btn.cancel {
            background: var(--zinc-800);
            color: white;
            border: 1px solid var(--zinc-700);
        }

        .pwa-prompt-btn:hover {
            transform: translateY(-2px);
        }

        /* Offline Indicator */
        .offline-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--red-500);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1002;
            animation: slideDown 0.3s ease-out;
        }

        .offline-indicator.hidden {
            display: none;
        }

        /* Common Components */
        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .items-center {
            align-items: center;
        }

        .justify-center {
            justify-content: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .absolute {
            position: absolute;
        }

        .relative {
            position: relative;
        }

        .fixed {
            position: fixed;
        }

        .inset-0 {
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
        }

        .w-full {
            width: 100%;
        }

        .h-full {
            height: 100%;
        }

        .min-h-screen {
            min-height: 100vh;
        }

        .p-4 {
            padding: 1rem;
        }

        .p-6 {
            padding: 1.5rem;
        }

        .p-8 {
            padding: 2rem;
        }

        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .py-2 {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }

        .py-6 {
            padding-top: 1.5rem;
            padding-bottom: 1.5rem;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .mb-6 {
            margin-bottom: 1.5rem;
        }

        .mb-8 {
            margin-bottom: 2rem;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .gap-4 {
            gap: 1rem;
        }

        .text-center {
            text-align: center;
        }

        .text-white {
            color: var(--white);
        }

        .text-zinc-400 {
            color: var(--zinc-400);
        }

        .text-zinc-300 {
            color: var(--zinc-300);
        }

        .text-zinc-600 {
            color: var(--zinc-600);
        }

        .text-2xl {
            font-size: 1.5rem;
            line-height: 2rem;
        }

        .text-xl {
            font-size: 1.25rem;
            line-height: 1.75rem;
        }

        .text-lg {
            font-size: 1.125rem;
            line-height: 1.75rem;
        }

        .text-sm {
            font-size: 0.875rem;
            line-height: 1.25rem;
        }

        .text-xs {
            font-size: 0.75rem;
            line-height: 1rem;
        }

        .font-bold {
            font-weight: 700;
        }

        .font-semibold {
            font-weight: 600;
        }

        .rounded-lg {
            border-radius: 0.5rem;
        }

        .rounded-xl {
            border-radius: 0.75rem;
        }

        .rounded-2xl {
            border-radius: 1rem;
        }

        .rounded-full {
            border-radius: 9999px;
        }

        .bg-black {
            background-color: var(--black);
        }

        .bg-zinc-900 {
            background-color: var(--zinc-900);
        }

        .bg-zinc-800 {
            background-color: var(--zinc-800);
        }

        .bg-zinc-800\/50 {
            background-color: rgba(39, 39, 42, 0.5);
        }

        .bg-zinc-700 {
            background-color: var(--zinc-700);
        }

        .bg-white\/10 {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .bg-white\/20 {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .backdrop-blur-sm {
            backdrop-filter: blur(4px);
        }

        .backdrop-blur-lg {
            backdrop-filter: blur(16px);
        }

        .backdrop-blur-md {
            backdrop-filter: blur(12px);
        }

        .border {
            border-width: 1px;
        }

        .border-zinc-700 {
            border-color: var(--zinc-700);
        }

        .border-zinc-800 {
            border-color: var(--zinc-800);
        }

        .shadow-lg {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .shadow-2xl {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .shadow-pink-500\/30 {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);
        }

        .shadow-amber-500\/30 {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .z-10 {
            z-index: 10;
        }

        .z-20 {
            z-index: 20;
        }

        .z-30 {
            z-index: 30;
        }

        .z-40 {
            z-index: 40;
        }

        .z-50 {
            z-index: 50;
        }

        .object-contain {
            object-fit: contain;
        }

        .cursor-pointer {
            cursor: pointer;
        }

        .cursor-not-allowed {
            cursor: not-allowed;
        }

        .opacity-30 {
            opacity: 0.3;
        }

        .opacity-50 {
            opacity: 0.5;
        }

        .transition-all {
            transition: all 0.3s ease;
        }

        .transition-colors {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        .hover\:bg-white\/20:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .hover\:bg-zinc-700:hover {
            background-color: var(--zinc-700);
        }

        .hover\:text-white:hover {
            color: var(--white);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .break-all {
            word-break: break-all;
        }

        .max-w-md {
            max-width: 28rem;
        }

        .mx-auto {
            margin-left: auto;
            margin-right: auto;
        }

        .top-4 {
            top: 1rem;
        }

        .bottom-4 {
            bottom: 1rem;
        }

        .left-4 {
            left: 1rem;
        }

        .right-4 {
            right: 1rem;
        }

        .bottom-32 {
            bottom: 8rem;
        }

        .top-1\/2 {
            top: 50%;
        }

        .-translate-y-1\/2 {
            transform: translateY(-50%);
        }

        .space-y-2 > * + * {
            margin-top: 0.5rem;
        }

        .space-y-4 > * + * {
            margin-top: 1rem;
        }

        /* Gradients */
        .gradient-bg {
            background: linear-gradient(135deg, var(--zinc-900), var(--black), var(--zinc-900));
        }

        .gradient-pink-violet {
            background: linear-gradient(to right, var(--pink-500), var(--violet-500));
        }

        .gradient-amber {
            background: linear-gradient(to right, var(--amber-500), var(--amber-600));
        }

        .gradient-emerald {
            background: linear-gradient(to right, var(--emerald-500), var(--emerald-600));
        }

        .gradient-blue {
            background: linear-gradient(to right, var(--blue-500), var(--blue-600));
        }

        .gradient-red {
            background: linear-gradient(to right, var(--red-500), var(--red-600));
        }

        .text-gradient {
            background: linear-gradient(to right, var(--pink-500), var(--violet-500));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Animations */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .animate-slide-down {
            animation: slideDown 0.3s ease-out;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--zinc-900);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--zinc-700);
            border-radius: 2px;
        }

        /* Loading spinner */
        .loading-spinner {
            border: 3px solid var(--zinc-700);
            border-top: 3px solid var(--pink-500);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: var(--zinc-900);
            border-radius: 1rem;
            border: 1px solid var(--zinc-800);
            padding: 1.5rem;
            max-width: 28rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Video player */
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: var(--black);
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 30%, transparent 50%);
        }

        /* Navigation dots */
        .nav-dot {
            width: 4px;
            height: 8px;
            background: var(--zinc-700);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            height: 24px;
            background: var(--pink-500);
        }

        /* Navigation arrows */
        .nav-arrow {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-arrow:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .nav-arrow:active:not(:disabled) {
            transform: scale(0.9);
        }

        .nav-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Action buttons */
        .action-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .action-button:hover {
            transform: scale(1.1);
        }

        .action-button:active {
            transform: scale(0.9);
        }

        .action-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .action-hold {
            background: linear-gradient(135deg, var(--pink-500), var(--pink-600));
        }

        .action-buy {
            background: linear-gradient(135deg, var(--amber-500), var(--amber-600));
        }

        /* Form elements */
        .input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--zinc-800);
            border: 1px solid var(--zinc-700);
            border-radius: 0.5rem;
            color: var(--white);
            font-size: 0.875rem;
            transition: border-color 0.3s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--pink-500);
        }

        .input::placeholder {
            color: var(--zinc-500);
        }

        .button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .button-primary {
            background: linear-gradient(to right, var(--pink-500), var(--violet-500));
            color: var(--white);
        }

        .button-primary:hover {
            background: linear-gradient(to right, var(--pink-600), var(--violet-600));
        }

        .button-secondary {
            background: var(--zinc-800);
            color: var(--white);
            border: 1px solid var(--zinc-700);
        }

        .button-secondary:hover {
            background: var(--zinc-700);
        }

        .button-success {
            background: linear-gradient(to right, var(--emerald-500), var(--emerald-600));
            color: var(--white);
        }

        .button-success:hover {
            background: linear-gradient(to right, var(--emerald-600), var(--emerald-700));
        }

        .button-warning {
            background: linear-gradient(to right, var(--amber-500), var(--amber-600));
            color: var(--white);
        }

        .button-warning:hover {
            background: linear-gradient(to right, var(--amber-600), var(--amber-700));
        }

        .button-blue {
            background: linear-gradient(to right, var(--blue-500), var(--blue-600));
            color: var(--white);
        }

        .button-blue:hover {
            background: linear-gradient(to right, var(--blue-600), var(--blue-700));
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Language selector */
        .language-selector {
            position: relative;
        }

        .language-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(39, 39, 42, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid var(--zinc-700);
            border-radius: 0.75rem;
            color: var(--white);
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .language-button:hover {
            background: var(--zinc-700);
        }

        .language-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            width: 200px;
            background: var(--zinc-900);
            border: 1px solid var(--zinc-700);
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 100;
            overflow: hidden;
        }

        .language-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: none;
            border: none;
            width: 100%;
            color: var(--white);
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-align: left;
        }

        .language-option:hover {
            background: var(--zinc-800);
        }

        .language-option.active {
            background: var(--zinc-800);
        }

        /* Bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--zinc-800);
            height: 64px;
            z-index: 40;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            height: 100%;
            max-width: 32rem;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            background: none;
            border: none;
            color: var(--zinc-400);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--pink-500);
        }

        /* Utility classes */
        .icon {
            width: 24px;
            height: 24px;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .icon-sm {
            width: 20px;
            height: 20px;
        }

        .icon-lg {
            width: 32px;
            height: 32px;
        }

        .success-icon {
            color: var(--emerald-500);
        }

        .error-icon {
            color: #ef4444;
        }

        .warning-icon {
            color: var(--amber-500);
        }

        /* Card styles */
        .card {
            background: rgba(39, 39, 42, 0.5);
            backdrop-filter: blur(4px);

        // ======== PWA FUNCTIONS ========
        function initPWA() {
            console.log('Initializing PWA...');
            
            // Check if already installed
            if (PWA.isStandalone) {
                console.log('App is running in standalone mode');
                return;
            }

            // Listen for beforeinstallprompt event
            window.addEventListener('beforeinstallprompt', (e) => {
                console.log('beforeinstallprompt event fired');
                e.preventDefault();
                PWA.deferredPrompt = e;
                
                // Show install button after a delay
                setTimeout(() => {
                    showInstallButton();
                }, 3000);
            });

            // Listen for app installed event
            window.addEventListener('appinstalled', () => {
                console.log('App was installed');
                hideInstallButton();
                hideInstallPrompt();
                PWA.deferredPrompt = null;
            });

            // Network status
            window.addEventListener('online', () => {
                PWA.isOnline = true;
                updateOfflineIndicator();
            });

            window.addEventListener('offline', () => {
                PWA.isOnline = false;
                updateOfflineIndicator();
            });

            // Initialize service worker
            initServiceWorker();
            
            // Update offline indicator
            updateOfflineIndicator();
        }

        function initServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(error => {
                    console.log('Service Worker registration failed:', error);
                });
            }
        }

        function showInstallButton() {
            const installBtn = document.getElementById('pwa-install-btn');
            if (installBtn && PWA.deferredPrompt && !PWA.isStandalone) {
                installBtn.classList.remove('hidden');
                installBtn.addEventListener('click', showInstallPrompt);
            }
        }

        function hideInstallButton() {
            const installBtn = document.getElementById('pwa-install-btn');
            if (installBtn) {
                installBtn.classList.add('hidden');
            }
        }

        function showInstallPrompt() {
            const prompt = document.getElementById('pwa-prompt');
            if (prompt) {
                prompt.classList.remove('hidden');
                
                // Add event listeners to buttons
                const installBtn = prompt.querySelector('.install');
                const cancelBtn = prompt.querySelector('.cancel');
                
                installBtn.addEventListener('click', installApp);
                cancelBtn.addEventListener('click', hideInstallPrompt);
            }
        }

        function hideInstallPrompt() {
            const prompt = document.getElementById('pwa-prompt');
            if (prompt) {
                prompt.classList.add('hidden');
            }
        }

        function installApp() {
            if (PWA.deferredPrompt) {
                PWA.deferredPrompt.prompt();
                
                PWA.deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    } else {
                        console.log('User dismissed the install prompt');
                    }
                    PWA.deferredPrompt = null;
                    hideInstallPrompt();
                    hideInstallButton();
                });
            }
        }

                            ${LanguageSelector()}
                        </div>

                        <h1 class="text-2xl font-bold mb-6">${t('adminPanel')}</h1>

                        <!-- Admin Tabs -->
                        <div class="admin-tabs">
                            <button class="admin-tab ${APP_STATE.adminTab === 'upload' ? 'active' : ''}" onclick="setAdminTab('upload')">
                                <i class="fas fa-upload"></i> ${t('uploadVideo')}
                            </button>
                            <button class="admin-tab ${APP_STATE.adminTab === 'users' ? 'active' : ''}" onclick="setAdminTab('users')">
                                <i class="fas fa-users"></i> ${t('userManagement')}
                                ${SAMPLE_USERS.length > 0 ? `<span class="notification-badge">${SAMPLE_USERS.length}</span>` : ''}
                            </button>
                            <button class="admin-tab ${APP_STATE.adminTab === 'requests' ? 'active' : ''}" onclick="setAdminTab('requests')">
                                <i class="fas fa-hand-paper"></i> ${t('requestManagement')}
                                ${pendingRequests > 0 ? `<span class="notification-badge">${pendingRequests}</span>` : ''}
                            </button>
                            <button class="admin-tab ${APP_STATE.adminTab === 'settings' ? 'active' : ''}" onclick="setAdminTab('settings')">
                                <i class="fas fa-cog"></i> ${t('settings')}
                            </button>
                        </div>

                        ${APP_STATE.adminTab === 'upload' ? AdminUploadTab() : ''}
                        ${APP_STATE.adminTab === 'users' ? AdminUsersTab() : ''}
                        ${APP_STATE.adminTab === 'requests' ? AdminRequestsTab() : ''}
                        ${APP_STATE.adminTab === 'settings' ? AdminSettingsTab() : ''}
                    </div>
                </div>
            `;
        };

        const AdminUploadTab = () => {
            return `
                <div class="animate-slide-up">
                    <!-- File Upload -->
                    <div class="file-upload" onclick="document.getElementById('videoFileInput').click()">
                        <input type="file" id="videoFileInput" accept="video/*" style="display: none;" onchange="handleFileSelect(event)">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>${t('selectFile')}</p>
                        <p>${t('orDragDrop')}</p>
                        <span>${t('maxSize')}</span>
                    </div>

                    <!-- Upload Form -->
                    <form onsubmit="event.preventDefault(); uploadVideo();">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('accountCategory')}</label>
                                <div class="account-tabs">
                                    <button type="button" class="account-tab ${APP_STATE.accountType === 'small' ? 'active' : ''}" onclick="APP_STATE.accountType = 'small'; renderApp()">
                                        ${t('small')}
                                    </button>
                                    <button type="button" class="account-tab ${APP_STATE.accountType === 'medium' ? 'active' : ''}" onclick="APP_STATE.accountType = 'medium'; renderApp()">
                                        ${t('medium')}
                                    </button>
                                    <button type="button" class="account-tab ${APP_STATE.accountType === 'big' ? 'active' : ''}" onclick="APP_STATE.accountType = 'big'; renderApp()">
                                        ${t('big')}
                                    </button>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('title')}</label>
                                <input type="text" id="videoTitle" class="input" placeholder="${t('title')}" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('description')}</label>
                                <textarea id="videoDescription" class="input" placeholder="${t('description')}" style="min-height: 80px;" required></textarea>
                            </div>
                            
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('videoPrice')}</label>
                                <div class="price-input">
                                    <input type="text" id="videoPrice" class="input" placeholder="1500" required>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('videoUrl')} (${t('or')} ${t('videoFile')})</label>
                                <input type="text" id="videoUrl" class="input" placeholder="https://example.com/video.mp4">
                            </div>
                            
                            <button type="submit" class="button button-success" style="width: 100%;">
                                <i class="fas fa-upload"></i>
                                ${t('upload')}
                            </button>
                        </div>
                    </form>

                    <!-- Videos List -->
                    <div class="mt-8">
                        <h3 class="text-lg font-semibold mb-4">${t('videos')} (${APP_STATE.videos.length})</h3>
                        
                        <div style="max-height: 300px; overflow-y: auto;">
                            ${APP_STATE.videos.map(video => `
                                <div style="background: var(--zinc-800); border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 0.5rem;">
                                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                                        <div style="flex: 1;">
                                            <p class="font-medium">${video.title}</p>
                                            <p class="text-zinc-400 text-sm">${video.type} • ${video.price}</p>
                                            <p class="text-zinc-500 text-xs truncate">${video.video_url?.substring(0, 40)}...</p>
                                        </div>
                                        <button onclick="deleteVideo(${video.id})" class="button button-secondary" style="padding: 0.25rem 0.5rem; margin-left: 0.5rem;">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        const AdminUsersTab = () => {
            const onlineUsers = SAMPLE_USERS.filter(u => u.status === 'online');
            
            return `
                <div class="animate-slide-up">
                    <!-- Stats Cards -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <div class="card">
                            <div style="text-align: center;">
                                <p class="text-sm text-zinc-400">${t('registeredUsers')}</p>
                                <p class="text-2xl font-bold">${SAMPLE_USERS.length}</p>
                            </div>
                        </div>
                        <div class="card">
                            <div style="text-align: center;">
                                <p class="text-sm text-zinc-400">${t('activeNow')}</p>
                                <p class="text-2xl font-bold text-emerald-500">${onlineUsers.length}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Users List -->
                    <div class="user-list">
                        <h3 class="text-lg font-semibold mb-4">${t('allUsers')}</h3>
                        
                        ${SAMPLE_USERS.map(user => `
                            <div class="user-item">
                                <div class="user-info">
                                    <div style="position: relative;">
                                        <div class="user-avatar">
                                            ${user.name?.[0]?.toUpperCase() || user.email[0]?.toUpperCase()}
                                        </div>
                                        <div class="user-status ${user.status === 'online' ? '' : 'offline'}"></div>
                                    </div>
                                    <div>
                                        <p class="font-medium">${user.name}</p>
                                        <p class="text-zinc-400 text-sm">${user.email}</p>
                                        <p class="text-zinc-500 text-xs">Joined: ${new Date(user.created_at).toLocaleDateString()}</p>
                                    </div>
                                </div>
                                <button onclick="openWhatsAppForUser('+1234567890')" class="button button-success" style="padding: 6px 12px; font-size: 0.875rem;">
                                    <i class="fab fa-whatsapp"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const AdminRequestsTab = () => {
            const pendingRequests = SAMPLE_HOLD_REQUESTS.filter(r => r.status === 'pending');
            
            return `
                <div class="animate-slide-up">
                    <!-- Stats -->
                    <div style="margin-bottom: 1.5rem;">
                        <div class="card">
                            <div style="text-align: center;">
                                <p class="text-sm text-zinc-400">${t('holdRequests')}</p>
                                <p class="text-2xl font-bold">${pendingRequests.length}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Requests List -->
                    <div class="user-list">
                        <h3 class="text-lg font-semibold mb-4">${t('holdRequests')}</h3>
                        
                        ${SAMPLE_HOLD_REQUESTS.map(request => `
                            <div class="user-item ${request.status === 'pending' ? 'hold-request' : request.status === 'dealt' ? 'deal-completed' : 'deal-cancelled'}">
                                <div style="flex: 1;">
                                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                                        <div>
                                            <p class="font-medium">${request.user_name}</p>
                                            <p class="text-zinc-400 text-sm">${request.whatsapp_number}</p>
                                            <p class="text-zinc-500 text-xs">${new Date(request.created_at).toLocaleDateString()}</p>
                                        </div>
                                        <span style="background: ${request.status === 'pending' ? 'var(--amber-500)' : request.status === 'dealt' ? 'var(--emerald-500)' : 'var(--red-500)'}; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase;">
                                            ${request.status}
                                        </span>
                                    </div>
                                    <p class="text-zinc-300 text-sm mb-2">Requested: ${request.video_title}</p>
                                    ${request.status === 'pending' ? `
                                        <div style="display: flex; gap: 0.5rem;">
                                            <button onclick="openWhatsAppForUser('${request.whatsapp_number}')" class="button button-success" style="flex: 1; padding: 8px;">
                                                <i class="fab fa-whatsapp"></i> ${t('contactUser')}
                                            </button>
                                            <button onclick="updateHoldRequestStatus(${request.id}, 'dealt')" class="button button-blue" style="flex: 1; padding: 8px;">
                                                <i class="fas fa-check"></i> ${t('markAsDealt')}
                                            </button>
                                            <button onclick="updateHoldRequestStatus(${request.id}, 'cancelled')" class="button button-secondary" style="flex: 1; padding: 8px;">
                                                <i class="fas fa-times"></i> ${t('markAsCancelled')}
                                            </button>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const AdminSettingsTab = () => {
            return `
                <div class="animate-slide-up">
                    <div class="card">
                        <h2 class="text-lg font-semibold mb-4">${t('settings')}</h2>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('whatsappContact')}</label>
                                <input type="text" id="adminWhatsapp" class="input" value="${APP_STATE.settings?.contact_whatsapp || ''}" placeholder="+1234567890">
                            </div>
                            
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('usdtAddress')}</label>
                                <input type="text" id="adminUSDT" class="input" value="${APP_STATE.settings?.usdt_address || ''}" placeholder="TXYZ...">
                            </div>
                            
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">${t('newPassword')}</label>
                                <input type="password" id="adminNewPassword" class="input" placeholder="${t('newPassword')}">
                            </div>
                            
                            <button onclick="saveSettings()" class="button button-primary" style="width: 100%;">
                                ${t('save')}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        // Event Handlers
        const handleWheel = (e) => {
            e.preventDefault();
            if (e.deltaY > 50) {
                handleScroll('down');
            } else if (e.deltaY < -50) {
                handleScroll('up');
            }
        };

        let touchStartY = 0;
        const handleTouchStart = (e) => {
            touchStartY = e.touches[0].clientY;
        };

        const handleTouchEnd = (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            if (diff > 50) {
                handleScroll('down');
            } else if (diff < -50) {
                handleScroll('up');
            }
        };

        const closeWelcomeModal = () => {
            APP_STATE.showWelcomeModal = false;
            localStorage.setItem('has_seen_welcome', 'true');
            renderApp();
        };

        const adminLogin = () => {
            const password = document.getElementById('adminPassword')?.value;
            if (password === APP_STATE.settings?.admin_password) {
                APP_STATE.isAdminLoggedIn = true;
                renderApp();
            } else {
                alert(t('invalidPassword'));
            }
        };

        const saveSettings = () => {
            const whatsapp = document.getElementById('adminWhatsapp')?.value || '';
            const usdt = document.getElementById('adminUSDT')?.value || '';
            const newPassword = document.getElementById('adminNewPassword')?.value;
            
            // In a real app, you would save this to a database
            console.log('Settings saved:', { whatsapp, usdt, newPassword });
            
            // Update local state
            if (APP_STATE.settings) {
                APP_STATE.settings.contact_whatsapp = whatsapp;
                APP_STATE.settings.usdt_address = usdt;
                if (newPassword) {
                    APP_STATE.settings.admin_password = newPassword;
                }
            }
            
            alert('Settings saved successfully!');
            renderApp();
        };

        const uploadVideo = () => {
            const title = document.getElementById('videoTitle')?.value || '';
            const description = document.getElementById('videoDescription')?.value || '';
            const price = document.getElementById('videoPrice')?.value || '$0';
            const url = document.getElementById('videoUrl')?.value;
            
            if (!title || !description || !price) {
                alert('Please fill all required fields');
                return;
            }
            
            const newVideo = {
                id: Date.now(),
                title,
                description,
                video_url: url || 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4',
                thumbnail_url: '',
                is_active: true,
                price: price.startsWith('$') ? price : `$${price}`,
                type: APP_STATE.accountType,
                created_at: new Date().toISOString()
            };
            
            APP_STATE.videos.unshift(newVideo);
            
            // Clear form
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDescription').value = '';
            document.getElementById('videoPrice').value = '';
            document.getElementById('videoUrl').value = '';
            
            alert('Video uploaded successfully!');
            renderApp();
        };

        const handleFileSelect = (event) => {
            const file = event.target.files[0];
            if (file) {
                if (file.size > 100 * 1024 * 1024) { // 100MB limit
                    alert('File is too large. Maximum size is 100MB.');
                    return;
                }
                
                if (!file.type.startsWith('video/')) {
                    alert('Please select a video file.');
                    return;
                }
                
                // In a real app, you would upload the file to a server
                alert(`Selected file: ${file.name}\nSize: ${(file.size / (1024 * 1024)).toFixed(2)}MB\nType: ${file.type}`);
                
                // Simulate upload and get URL
                document.getElementById('videoUrl').value = `https://example.com/uploads/${Date.now()}_${file.name}`;
            }
        };

        const deleteVideo = (id) => {
            if (confirm('Are you sure you want to delete this video?')) {
                APP_STATE.videos = APP_STATE.videos.filter(video => video.id !== id);
                if (APP_STATE.currentVideoIndex >= APP_STATE.videos.length) {
                    APP_STATE.currentVideoIndex = Math.max(0, APP_STATE.videos.length - 1);
                }
                renderApp();
            }
        };

        const logout = () => {
            APP_STATE.user = null;
            APP_STATE.isAdminLoggedIn = false;
            navigateTo('home');
        };

        // Render App
        const renderApp = () => {
            const app = document.getElementById('app');
            
            let pageContent = '';
            switch (APP_STATE.currentPage) {
                case 'home':
                    pageContent = HomePage();
                    break;
                case 'accounts':
                    pageContent = AccountsPage();
                    break;
                case 'contact':
                    pageContent = ContactPage();
                    break;
                case 'profile':
                    pageContent = ProfilePage();
                    break;
                case 'admin':
                    pageContent = AdminPage();
                    break;
                default:
                    pageContent = HomePage();
            }
            
            app.innerHTML = pageContent;
            
            // Add keyboard navigation for home page
            if (APP_STATE.currentPage === 'home') {
                document.addEventListener('keydown', handleKeyDown);
            } else {
                document.removeEventListener('keydown', handleKeyDown);
            }
            
            // Add scroll event listener for accounts page
            if (APP_STATE.currentPage === 'accounts') {
                const container = document.querySelector('.accounts-scroll-container');
                if (container) {
                    container.addEventListener('scroll', handleAccountsScroll);
                }
            }
        };

        // ======== NEW FUNCTION: HANDLE ACCOUNTS PAGE SCROLL ========
        const handleAccountsScroll = () => {
            const container = document.querySelector('.accounts-scroll-container');
            if (!container) return;
            
            const scrollPosition = container.scrollTop;
            const windowHeight = window.innerHeight;
            const currentIndex = Math.round(scrollPosition / windowHeight);
            
            // You could update a visual indicator here if needed
            // console.log('Currently viewing video index:', currentIndex);
        };

        const handleKeyDown = (e) => {
            if (e.key === 'ArrowUp') {
                handleScroll('up');
            } else if (e.key === 'ArrowDown') {
                handleScroll('down');
            }
        };

        // Initialize App
        const initApp = () => {
            console.log('Initializing app...');
            
            // Initialize PWA
            initPWA();
            
            // Load language
            const savedLanguage = localStorage.getItem('app_language') || 'en';
            setLanguage(savedLanguage);
            
            // Load videos
            APP_STATE.videos = SAMPLE_VIDEOS;
            
            // Load settings
            APP_STATE.settings = SAMPLE_SETTINGS;
            
            // Load users
            APP_STATE.users = SAMPLE_USERS;
            
            // Load hold requests
            APP_STATE.heldAccounts = SAMPLE_HOLD_REQUESTS;
            
            // Check if welcome modal should be shown
            const hasSeenWelcome = localStorage.getItem('has_seen_welcome');
            APP_STATE.showWelcomeModal = !hasSeenWelcome;
            
            // Set sample user
            APP_STATE.user = {
                name: 'John Doe',
                email: 'john@example.com',
                role: 'user'
            };
            
            // Initial render
            renderApp();
        };

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
